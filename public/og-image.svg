  <desc id="desc">Discover the latest job opportunities updated daily on Hiringstoday.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B567F" />
      <stop offset="100%" stop-color="#033F63" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="170" cy="110" r="150" fill="#F3A713" opacity="0.15" />
  <circle cx="1040" cy="540" r="210" fill="#F8D278" opacity="0.12" />
  <text x="90" y="250" fill="#F9FBFC" font-family="Poppins, Arial, sans-serif" font-size="76" font-weight="800">
